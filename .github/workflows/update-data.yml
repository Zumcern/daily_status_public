
name: Run parser and update data

permissions:
  contents: write
on:
  workflow_dispatch:

  schedule:
    # 07:30–07:55 norsk tid → 06:30–06:55 UTC
    - cron: "30-59/5 6 * * *"

    # 08:00–08:15 norsk tid → 07:00–07:15 UTC
    - cron: "0-15/5 7 * * *"

    # Én gang i timen 09–17 norsk tid → 08–16 UTC
    - cron: "0 8-16 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install pandas openpyxl

      
      - name: Run parser (skip if Excel missing)
        run: |
          EXCEL="input/Arbeidsplan simulatoroperatører.xlsx"

          if [ ! -f "$EXCEL" ]; then
            echo "Excel not present – skipping run"
            exit 0
          fi

          python parser.py --excel "$EXCEL"


      - name: Commit generated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Avbryt pent hvis output-mappen ikke finnes
          if [ ! -d data/generated ]; then
            echo "No generated data directory – nothing to commit"
            exit 0
          fi

          # Legg til JSON-filer hvis de finnes
          git add data/generated/*.json || true

          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi

          TS=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "Update generated JSON (${TS})"
          git push
